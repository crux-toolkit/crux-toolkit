name: build-crux-distributions

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CRUX_VERSION: 4.3.2

jobs:
  setup:
    name: Setup Crux build environment
    runs-on: 'ubuntu-22.04'

    steps:
      - name: checkout-repository    
        uses: actions/checkout@v6
 
      - name: add-short-sha
        shell: bash
        run: |
          echo "git_short_sha=`git rev-parse --short HEAD`"  >> $GITHUB_ENV
          
      - name: setup-python
        uses: actions/setup-python@v6
        with: 
            python-version: 3.x
 
      - name: configure-build-for-ubuntu
        shell: bash
        run: |
              python -m pip install numpy
              python -m pip install pandas
              sudo apt-get install ruby
              sudo apt-get install cucumber
              sudo gem install rspec
              cmake -E make_directory "${{runner.workspace}}/build"
              cd "${{runner.workspace}}/build"
              echo Configuring in $(pwd)
              cmake "${{github.workspace}}" -DCMAKE_BUILD_TYPE=$BUILD_TYPE

  build:
    name: Build Crux
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - name: build
        shell: bash
        run: |
             cd "${{runner.workspace}}/build"
             echo Building in $(pwd)
             cmake --build . --config $BUILD_TYPE 

  test:
    name: Test Crux with smoke-tests
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Test
        continue-on-error: true
        shell: bash
        run: |
             cd ${{runner.workspace}}/build/test
             rm -rf smoke-tests
             cp -r /home/runner/work/crux-toolkit/crux-toolkit/test/smoke-tests .
             cd smoke-tests
             cucumber -v -f html -o smoke-tests.html \
               && echo "cucumber_exit_code=$?"  >> $GITHUB_ENV \
               || echo "cucumber_exit_code=$?"  >> $GITHUB_ENV \
               && echo $cucumber_exit_code

      - name: Archive smoke test results
        uses: actions/upload-artifact@v6
        with:
          name: smoke.html
          path: ${{runner.workspace}}/build/test/smoke-tests/smoke-tests.html
          
      - name: Let the workflow fail if the test suite failed
        shell: bash
        run: |
          bash -c 'exit "${{env.cucumber_exit_code}}"'

  build-and-archive-package:
    name: Build and archive packages
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: build-package
        shell: bash
        run: |
             cd "${{runner.workspace}}/build"
             cmake --build . --config $BUILD_TYPE --target package

      - name: archive-ubuntu-package
        uses: actions/upload-artifact@v6
        with:
          name: crux-$CRUX_VERSION.${{env.git_short_sha}}.ubuntu.22.04
          path:  ${{runner.workspace}}/build/crux-$CRUX_VERSION.Linux.x86_64.zip

  build-and-archive-source-package:
    name: Build and archive packages
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: build-source-package
        shell: bash
        run: |
             cd "${{runner.workspace}}/build"
             cmake --build . --config $BUILD_TYPE --target package_source

      - name: Archive source package
        uses: actions/upload-artifact@v6
        with:
          name: crux-$CRUX_VERSION.${{env.git_short_sha}}.Source
          path: ${{runner.workspace}}/build/crux-$CRUX_VERSION.Source.tar.gz
